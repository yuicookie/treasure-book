<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宝物図鑑</title>

    <!-- OGP設定(SNSプレビューを空白に) -->
    <meta property="og:title" content=" ">
    <meta property="og:description" content=" ">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content=" ">
    <meta name="twitter:description" content=" ">

    <link rel="apple-touch-icon" type="image/webp" href="img/apple-touch-icon-180x180.webp">
    <link rel="icon" type="image/webp" href="img/icon-192x192.webp">
    <style>
        /*
        =================================
        基本設定とリセット
        =================================
        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none; /* 画像保存禁止 */
            /* -webkit-user-select: none; */ /* コピー禁止 */
        }

        body {
            font-family: 'Arial', sans-serif;
            background-image: url('img/background.webp');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /*
        =================================
        メインコンテナ
        =================================
        */
        .book-frame {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4/3;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .inventory-container {
            background: #E8F5E8;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            height: 90vh;
            max-height: 90vh;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /*
        =================================
        スマホ対応レスポンシブ
        =================================
        */
        @media (max-width: 768px) {
            body {
                padding: 10px;
                align-items: flex-start;
                padding-top: 20px;
            }

            .book-frame {
                width: 100%;
                aspect-ratio: unset;
                height: calc(100vh - 140px);
            }

            .inventory-container {
                height: 100%;
                max-height: 100%;
                padding: 15px;
                border-radius: 15px;
            }

            .header-toggle-btn {
                width: 30px;
                height: 30px;
                font-size: 14px;
                top: 8px;
                right: 8px;
            }

            .title {
                font-size: 20px;
            }

            .tab-buttons {
                gap: 5px;
            }

            .tab-btn {
                padding: 8px 12px;
                font-size: 14px;
            }

            .item-count {
                font-size: 12px;
            }

            /* スマホ縦向き: 7列表示 */
            .inventory-grid {
                grid-template-columns: repeat(7, 1fr);
                gap: 8px;
                padding: 10px;
            }
        }

        /* スマホ横向き対応 */
        @media (max-width: 1768px) and (orientation: landscape) {
            body {
                align-items: center;
                padding: 10px 100px;
            }

            .book-frame {
                height: calc(100vh - 20px);
            }

            .inventory-container {
                padding: 10px;
            }

            .header {
                padding-bottom: 8px;
            }

            .title {
                font-size: 18px;
            }

            .tab-btn {
                padding: 6px 10px;
                font-size: 13px;
            }

            .item-count {
                font-size: 11px;
            }

            /* スマホ横向き: 7列表示（少し小さく） */
            .inventory-grid {
                grid-template-columns: repeat(7, 1fr);
                gap: 6px;
                padding: 8px;
            }

    		.popup-overlay {
        		padding: 10px 20px;  /* 左右の余白を削減 */
    		}

    		.popup {
        		padding: 15px;
        		max-width: 350px;          /* 幅を制限して縦長に */
        		width: 350px;              /* 固定幅で縦長効果 */
        		max-height: calc(100vh - 20px);  /* 縦幅を画面いっぱいに */
        		height: auto;              /* 高さは自動調整 */
        		min-height: calc(100vh - 40px);  /* 最小高さを設定して縦長に */
    		}
        }

        /*
        =================================
        ヘッダー部分
        =================================
        */
        .header {
            display: flex;
            flex-direction: column;
            border-bottom: 2px solid #e0e0e0;
            flex-shrink: 0;
            position: relative;
        }

        .header-toggle-btn {
            position: absolute;
            top: 5px;
            right: -10px;
            background: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            cursor: pointer;
            font-size: 16px;
            color: #666;
            transition: all 0.3s ease;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-toggle-btn:hover {
            background: #e0e0e0;
            color: #333;
        }

        .header-content {
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .header-content.collapsed {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            opacity: 0;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center; /* ボタンを中央揃えにする */
        }

        /*
        =================================
        タブボタン
        =================================
        */
        .tab-buttons {
            display: flex;
            gap: 10px;
            padding-bottom: 10px;
            justify-content: center; /* ボタンを中央揃えにする */
        }

        .tab-btn {
            padding: 10px 10px;
            /* border: none; */
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 18px; /* 暫定対応 */
        }

        .tab-btn.active {
            background: linear-gradient(45deg, #4fc3f7, #29b6f6);
            color: white;
        }

        .tab-btn:not(.active) {
            background: #f0f0f0;
            color: #666;
        }

        .tab-btn:hover:not(.active) {
            background: #e0e0e0;
        }

        /*
        =================================
        祝福宝物の回転エフェクト
        =================================
        */
        .blessing-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 3;
            animation: blessing-rotate 3s linear infinite;
            pointer-events: none;
        }

        @keyframes blessing-rotate {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* ポップアップ内の祝福エフェクト */
        .popup-blessing-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 3;
            animation: blessing-rotate 3s linear infinite;
            pointer-events: none;
        }

        /* 祝福宝物のスタイル */
        .popup.blessed {
            background: linear-gradient(135deg, #e8f5e8, #4fc3f7);
            border: 3px solid #29b6f6;
        }

        /*
        =================================
        エフェクトアニメーション
        =================================
        */
        .effect-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 6;
            pointer-events: none;
            animation: effect-loop 3s infinite;
        }

        @keyframes effect-loop {
            0% {
                background-image: url('img/treasure_frame_effect01.webp');
            }

            3.33% {
                background-image: url('img/treasure_frame_effect02.webp');
            }

            6.66% {
                background-image: url('img/treasure_frame_effect03.webp');
            }

            9.99% {
                background-image: url('img/treasure_frame_effect04.webp');
            }

            13.32% {
                background-image: url('img/treasure_frame_effect06.webp');
            }

            16.65% {
                background-image: none;
            }

            100% {
                background-image: none;
            }
        }

        /* ポップアップ内のエフェクトアニメーション */
        .popup-effect-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 6;
            pointer-events: none;
            animation: effect-loop 3s infinite;
        }

        /*
        =================================
        表示数カウント
        =================================
        */
        .item-count-display {
            display: block;
            margin-left: auto;
            margin-right: 12px;
            margin-top: 6px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            position: relative;
            z-index: 5;
        }

        @media (max-width: 768px) {
            .item-count-display {
                margin-right: 12px;
                margin-top: 6px;
                font-size: 12px;
            }
        }

        /*
        =================================
        インベントリグリッド
        =================================
        */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, calc((100% - 36px) / 7));
            gap: 6px;
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 8px;
            background: #FFF8DC;
            border-radius: 15px;
            position: relative;
            margin-top: 10px;
            min-height: 0;
            justify-content: start;
            align-content: start;
        }

        .inventory-grid::-webkit-scrollbar {
            width: 8px;
        }

        .inventory-grid::-webkit-scrollbar-track {
            background: #e0e0e0;
            border-radius: 4px;
        }

        .inventory-grid::-webkit-scrollbar-thumb {
            background: #29b6f6;
            border-radius: 4px;
        }

        /*
        =================================
        アイテムスロット
        =================================
        */
        .item-slot {
            aspect-ratio: 1;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 15px;
        }

        .item-slot:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .item-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
            pointer-events: none;
        }

        .item-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 2;
        }

        /*
        =================================
        パッシブタグエフェクト
        =================================
        */
        .passive-tag-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 5;
            pointer-events: none;
        }

        /* ポップアップ内のパッシブタグエフェクト */
        .popup-passive-tag-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 5;
            pointer-events: none;
        }

        /*
        =================================
        ポップアップ - オーバーレイ
        =================================
        */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 20px;
        }

        .popup-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        /*
        =================================
        ポップアップ - メインコンテンツ
        =================================
        */
        .popup {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transform: scale(0.8);
            position: relative;
        }

        .popup-overlay.show .popup {
            transform: scale(1);
        }

        .popup-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        /*
        =================================
        ポップアップ - アイコン
        =================================
        */
        .popup-icon {
            width: 60px;
            height: 60px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            flex-shrink: 0;
        }

        .popup-icon::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        .popup-icon .popup-item-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 2;
        }

        /*
        =================================
        ポップアップ - コンテンツセクション
        =================================
        */
        .popup-title {
            margin-right: 10px;
            font-size: 20px;
            font-weight: bold;
            line-height: 1.2;
            color: #333;
            white-space: pre-line;
            word-wrap: break-word;
        }

        .popup-section {
            margin-bottom: 15px;
            background: #f8f8f8;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #e0e0e0;
        }

        .popup-section-title {
            background: #e8e8e8;
            margin: -15px -15px 10px -15px;
            padding: 10px 15px;
            border-radius: 10px 10px 0 0;
            border-bottom: 1px solid #d0d0d0;
            font-weight: bold;
            color: #666;
        }

        .popup-description {
            color: #555;
            line-height: 1.6;
            background: transparent;
            padding: 0;
            border-radius: 0;
        }

        /*
        =================================
        進化プレビュー
        =================================
        */
        .evolution-preview {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            padding: 10px;
            background: #f0f8ff;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .evolution-preview:hover {
            background: #e3f2fd;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(41, 182, 246, 0.3);
        }

        .evolution-icon {
            width: 60px;
            height: 60px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .evolution-icon::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        .evolution-icon .evolution-item-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 2;
        }

        /*
        =================================
        進化後アイテムのスタイル
        =================================
        */
        .popup.evolved {
            background: linear-gradient(135deg, #fff3e0, #ffcc02);
            border: 3px solid #ff9800;
        }

        /*
        =================================
        一般宝物のスタイル
        =================================
        */
        .popup:not(.evolved) {
            border: 3px solid #ff9800;
        }

        /*
        =================================
        共有ボタン
        =================================
        */
        .share-btn {
            position: absolute;
            top: 5px;
            left: 15px;
            padding: 8px 15px;
            border: 2px solid #ff9800;
            border-radius: 20px;
            background: white;
            color: #ff9800;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            white-space: nowrap;
            z-index: 10;
        }

        .share-btn:hover {
            background: #ff9800;
            color: white;
        }

        .share-btn:active {
            background: #f57c00;
            transform: scale(0.95);
        }

        .share-btn.copied {
            background: #66bb6a;
            border-color: #66bb6a;
            color: white;
        }

        @media (max-width: 768px) {
            .share-btn {
                padding: 6px 12px;
                font-size: 12px;
                top: 3px;
                left: 10px;
            }
        }

        /*
        =================================
        韓国語名コピーボタン
        =================================
        */
        .copy-korean-btn {
            position: absolute;
            top: 5px;
            right: 55px;
            padding: 8px 15px;
            border: 2px solid #4fc3f7;
            border-radius: 20px;
            background: white;
            color: #4fc3f7;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            white-space: nowrap;
            z-index: 10;
        }

        .copy-korean-btn:hover {
            background: #4fc3f7;
            color: white;
        }

        .copy-korean-btn:active {
            background: #29b6f6;
            transform: scale(0.95);
        }

        .copy-korean-btn.copied {
            background: #66bb6a;
            border-color: #66bb6a;
            color: white;
        }

        @media (max-width: 768px) {
            .copy-korean-btn {
                padding: 6px 12px;
                font-size: 12px;
                top: 3px;
                right: 35px;
            }
        }

        /*
        =================================
        閉じるボタン
        =================================
        */
        .close-btn {
            position: absolute;
            top: 0px;
            right: 0px;
            background: url('img/btn_x.webp') no-repeat center center;  /* 画像を背景に設定 */
            background-size: contain;  /* 画像をボタンサイズに合わせる */
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
        }

        .close-btn:hover {
            background-image: url('img/btn_x.webp');  /* ホバー時も同じ画像 */
            background-color: rgba(0, 0, 0, 0.3);   /* 薄暗いオーバーレイ */
            background-blend-mode: darken;           /* 画像を暗くするブレンドモード */
        }

        /*
        =================================
        ポップアップ - レスポンシブ対応
        =================================
        */
        @media (max-width: 768px) {
            .popup {
                padding: 20px;
                margin: 10px;
                /* max-width: calc(100vw - 20px); */
                max-height: calc(100vh - 120px);
            }

            .popup-header {
                gap: 10px;
                margin-bottom: 15px;
            }

            .popup-icon {
                width: 50px;
                height: 50px;
            }

            .popup-title {
                font-size: 18px;
            }

            .evolution-icon {
                width: 50px;
                height: 50px;
            }

            .close-btn {
                width: 25px;
                height: 25px;
                background: url('img/btn_x.webp') no-repeat center center;
                background-size: contain;
                font-size: 0;
                color: transparent;
            }

            .close-btn:hover {
                background-image: url('img/btn_x.webp');
                background-color: rgba(0, 0, 0, 0.3);
                background-blend-mode: darken;
            }
        }
        /*
        =================================
        バージョン表示
        =================================
        */
        .update-version {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 12px;
            color: #666;
            background: rgba(255, 255, 255, 0.8);
            padding: 4px 8px;
            border-radius: 4px;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .update-version {
                font-size: 10px;
                bottom: 5px;
                left: 5px;
                padding: 2px 6px;
            }
        }
        /*
        =================================
        言語切り替えボタン
        =================================
        */
        .language-selector {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            font-size: 14px;
        }

        .language-selector label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            color: #666;
        }

        .language-selector input[type="radio"] {
            margin: 0;
        }

        @media (max-width: 768px) {
            .language-selector {
                gap: 10px;
                font-size: 12px;
            }
        }
		/*
        =================================
        検索オプション
        =================================
        */
        .search-options {
            margin: 10px 0 5px 0;
        }

        .search-checkboxes {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .search-checkboxes label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            color: #666;
            font-size: 14px;
            white-space: nowrap;
        }

        .search-checkboxes input[type="checkbox"] {
            margin: 0;
            cursor: pointer;
        }

        .search-checkboxes input[type="checkbox"]:checked + span,
        .search-checkboxes label:has(input[type="checkbox"]:checked) {
            color: #29b6f6;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .search-checkboxes {
                gap: 10px;
                font-size: 12px;
            }

            .search-checkboxes label {
                font-size: 12px;
            }
        }

        /*
        =================================
        バージョンフィルタボタン
        =================================
        */
        .version-filter-select {
            padding: 5px 15px;
            border: 2px solid #29b6f6;
            border-radius: 15px;
            background: white;
            color: #29b6f6;
            cursor: pointer;
            font-size: 14px;

        }

        .version-filter-select option {
            background: white;
            color: #333;
            font-weight: normal;

        .version-filter-select option:first-child {
            color: #999;

        @media (max-width: 768px) {
            .version-filter-select {
                padding: 6px 12px;

        }

        /*

        検索ボックス

        */
        .search-container {

        #searchBox {
            width: 100%;
            padding: 10px 40px 10px 15px;
            border: 2px solid #e0e0e0;

            font-size: 16px;

            display: flex;

        @media (max-width: 768px) {

                font-size: 14px;
                padding: 8px 35px 8px 12px;

</head>

<body>

    <div class="book-frame">
<div class="inventory-container">
<div class="header">

    <div class="header-content" id="headerContent">

            📖 宝物図鑑
            <div class="language-selector">

                <label><input type="radio" name="language" value="ko" onchange="switchLanguage(this.value)"> 한국어</label>

        <div class="search-options">

        </div>
    </div>
        <div class="tab-buttons">

            <button class="tab-btn" id="evolutionTab" onclick="switchTab('evolution')">進化宝物</button>

</div>

            <div class="item-count-display" id="itemCountDisplay">宝物数: 0件</div>
            <div class="inventory-grid" id="inventoryGrid">
                <!-- アイテムがJavaScriptで動的に生成される -->
            </div>
        </div>

    <div class="popup-overlay" id="popupOverlay">
        <div class="popup" id="popup">
            <button class="share-btn" id="shareBtn" onclick="inventoryUI.shareItem()">🔗共有</button>
            <button class="copy-korean-btn" id="copyKoreanBtn" style="display: none;">🔍韓国語名コピー</button>
            <button class="close-btn" onclick="closePopup()"></button>
            <div class="popup-header">
                <div class="popup-icon" id="popupIcon"></div>
                <div class="popup-title" id="popupTitle"></div>
            </div>
            <div class="popup-section">
                <div class="popup-section-title">装着効果</div>
                <div class="popup-description" id="popupEffect"></div>
            </div>
            <div class="popup-section">
                <div class="popup-section-title">入手方法</div>
                <div class="popup-description" id="popupMethod"></div>
            </div>
            <div class="popup-section" id="evolutionSection" style="display: none;">
                <div class="popup-section-title">進化可能な宝物</div>
                <div class="popup-description" id="popupEvolution"></div>
            </div>
        </div>
    </div>
    <script src="data.js"></script>
    <script src="data_ko.js"></script>
    <script>
        /*
        =================================
        ユーティリティ関数
        =================================
        */
        // 韓国語名を取得する関数
        function getKoreanName(itemId) {
            // 全カテゴリから検索
            for (let category of ['general', 'evolution', 'blessed']) {
                const koItem = ITEM_DATA_KO[category].find(item => item.id === itemId);
                if (koItem) {
                    return koItem.name;
                }
            }
            return null; // 見つからない場合
        }

        // アイテム画像パス生成関数
        function getItemImagePath(itemId, isEvolved = false) {
            // 祝福宝物の場合、進化宝物と同じ画像を使用
            if (itemId.includes('_blessed')) {
                const baseId = itemId.replace('_blessed', '');
                return `img/${baseId}.webp`;
            }
            return `img/${itemId}.webp`;
        }

        // フレーム画像パス生成関数
        function getFrameImagePath(rarity, tabType = 'general') {
            const rarityLower = rarity.toLowerCase();
            if (tabType === 'evolution') {
                return `img/treasure_mix_frame_${rarityLower}.webp`;
            } else if (tabType === 'blessed') {
                return `img/treasure_mix_frame_${rarityLower}.webp`;
            }
            return `img/treasure_frame_${rarityLower}.webp`;
        }

        // 祝福エフェクト画像パス生成関数
        function getBlessingEffectPath(rarity) {
            if (rarity === 'S') {
                return 'img/treasure_frame_effect05.webp';
            }
            return 'img/treasure_frame_effect07.webp';
        }
        // レアリティによる色取得
        function getRarityColor(rarity) {
            switch (rarity) {
                case 'C': return '#808080';  // 灰色
                case 'B': return '#4fc3f7';  // 青色
                case 'A': return '#FF9800';  // オレンジ色
                case 'S': return '#9C27B0';  // 紫色
                case 'U': return '#191919';  // 黒色
                default: return '#808080';
            }
        }

        /*
        =================================
        UI管理クラス
        =================================
        */
        // UI管理クラス
        class InventoryUI {
            constructor() {
                this.currentTab = 'general';
                this.currentPopupItem = null;
                this.popupHistory = []; // ポップアップの履歴を管理
                this.popupSource = null; // ポップアップの発生源を記録
                this.scrollPositions = { // 各タブのスクロール位置を保持
                    general: 0,
                    evolution: 0,
                    blessed: 0
                };
                this.isSearching = false; // 検索中かどうかのフラグ
                this.searchResults = { // 検索結果を保持
                    general: [],
                    evolution: [],
                    blessed: []
                };
                this.originalData = null; // 元のデータを保持
                this.searchOptions = { // 検索オプションの状態
                    name: true,
                    effect: true,
                    method: false,
                    description: false
                };
                this.isHeaderCollapsed = false; // ヘッダーの開閉状態
                this.isVersionFiltered = false; // バージョンフィルタ状態
                this.currentVersion = null; // 現在のフィルタバージョン
            }

            /*
            =================================
            インベントリグリッド関連メソッド
            =================================
            */
            // レアリティによるソート順序を定義
            getRaritySortOrder(rarity) {
                const order = { 'S': 1, 'A': 2, 'B': 3, 'C': 4, 'U': 5 };
                return order[rarity] || 999;
            }

            // インベントリグリッドを作成
            createInventoryGrid(items) {
                const grid = document.getElementById('inventoryGrid');
                grid.innerHTML = '';

                // アイテムデータを(レアリティ→ダミーフラグ→パッシブタグ→booknone→アイテムデータ配列順)でソート
                const sortedItems = [...items].sort((a, b) => {
                    // 1. レアリティでソート（S→A→B→C順）
                    const orderA = this.getRaritySortOrder(a.rarity);
                    const orderB = this.getRaritySortOrder(b.rarity);

                    if (orderA !== orderB) {
                        return orderA - orderB;
                    }

                    // 2. 同じレアリティ内ではダミーフラグでソート（実データが先）
                    const isDummyA = a.isDummy || false;
                    const isDummyB = b.isDummy || false;

                    if (isDummyA !== isDummyB) {
                        return isDummyA - isDummyB; // false(0) が先、true(1) が後
                    }

                    // 3. 同じレアリティ・ダミーフラグ内ではbooknoneでソート（booknoneなしが先、booknoneありが後）
                    const hasBooknoneA = a.booknone || false;
                    const hasBooknoneB = b.booknone || false;

                    if (hasBooknoneA !== hasBooknoneB) {
                        return hasBooknoneA - hasBooknoneB; // false(0) が先、true(1) が後
                    }

                    // 4. 同じレアリティ・ダミーフラグ・booknone内ではパッシブタグでソート（パッシブタグなしが先、パッシブタグありが後）
                    const hasPassiveA = a.hasPassiveTag || false;
                    const hasPassiveB = b.hasPassiveTag || false;

                    if (hasPassiveA !== hasPassiveB) {
                        return hasPassiveA - hasPassiveB; // false(0) が先、true(1) が後
                    }

                    // 5. 最後にアイテムデータ配列順でソート（元の配列順序を維持）
                    const indexA = items.indexOf(a);
                    const indexB = items.indexOf(b);

                    return indexA - indexB;
                });
                sortedItems.forEach(item => {
                    const slot = this.createItemSlot(item);
                    grid.appendChild(slot);
                });

                this.updateItemCount(sortedItems.length);
            }

            // アイテムスロットを作成
            createItemSlot(item) {
                const slot = document.createElement('div');
                slot.className = `item-slot ${item.rarity}`;
                slot.onclick = () => this.showItemPopup(item);

                // フレーム画像
                const frameImage = document.createElement('div');
                frameImage.className = 'item-frame';
                frameImage.style.backgroundImage = `url('${getFrameImagePath(item.rarity, this.currentTab)}')`;

                // アイテム画像
                const itemImage = document.createElement('div');
                itemImage.className = 'item-image';
                const isEvolved = this.currentTab === 'evolution' || this.currentTab === 'blessed';
                itemImage.style.backgroundImage = `url('${getItemImagePath(item.id, isEvolved)}')`;

                // 祝福宝物の場合、z-indexを設定して回転エフェクトより上に表示
                if (this.currentTab === 'blessed') {
                    itemImage.style.zIndex = '4';
                }

                slot.appendChild(frameImage);
                slot.appendChild(itemImage);

                // 祝福宝物の場合、回転エフェクトを追加
                if (this.currentTab === 'blessed') {
                    const blessingEffect = document.createElement('div');
                    blessingEffect.className = 'blessing-effect';
                    blessingEffect.style.backgroundImage = `url('${getBlessingEffectPath(item.rarity)}')`;
                    slot.appendChild(blessingEffect);
                }

                // パッシブタグエフェクトを追加（一番上に表示）
                if (item.hasPassiveTag) {
                    const passiveTagEffect = document.createElement('div');
                    passiveTagEffect.className = 'passive-tag-effect';
                    passiveTagEffect.style.backgroundImage = `url('img/treasure_tag_passive.webp')`;
                    slot.appendChild(passiveTagEffect);
                }

                // Useタグエフェクトを追加（パッシブタグと同じ位置に表示）
                if (item.hasUseTag) {
                    const useTagEffect = document.createElement('div');
                    useTagEffect.className = 'passive-tag-effect'; // 同じクラスを使用
                    useTagEffect.style.backgroundImage = `url('img/treasure_tag_use.webp')`;
                    slot.appendChild(useTagEffect);
                }

                // Sランクの祝福宝物の場合、エフェクトアニメーションを追加（最上位に表示）
                if (this.currentTab === 'blessed' && item.rarity === 'S') {
                    const effectAnimation = document.createElement('div');
                    effectAnimation.className = 'effect-animation';
                    slot.appendChild(effectAnimation);
                }

                return slot;
            }

            /*
            =================================
            ポップアップ関連メソッド
            =================================
            */
            // アイテム詳細ポップアップを表示
            showItemPopup(item, source = 'grid') {
                // ポップアップを開く前に現在のスクロール位置を保存
                const grid = document.getElementById('inventoryGrid');
                if (grid && source === 'grid') {
                    this.scrollPositions[this.currentTab] = grid.scrollTop;
                }

                this.currentPopupItem = item;
                this.popupSource = source;

                // 履歴を管理
                if (source === 'grid') {
                    // グリッドから開いた場合は履歴をリセットして新たに開始
                    this.popupHistory = [item];
                } else if (source === 'evolution' || source === 'blessed') {
                    // 既に履歴に同じアイテムがある場合はそこまで巻き戻す（ループ防止）
                    const existingIndex = this.popupHistory.findIndex(h => h.id === item.id);
                    if (existingIndex !== -1) {
                        this.popupHistory = this.popupHistory.slice(0, existingIndex + 1);
                    } else {
                        this.popupHistory.push(item);
                    }
                }
                // source === 'history' の場合は closePopup で pop 済みのため変更しない

                const overlay = document.getElementById('popupOverlay');
                const popup = document.getElementById('popup');
                const icon = document.getElementById('popupIcon');
                const title = document.getElementById('popupTitle');
                const effect = document.getElementById('popupEffect');
                const method = document.getElementById('popupMethod');
                const evolutionSection = document.getElementById('evolutionSection');
                const evolution = document.getElementById('popupEvolution');

                // ポップアップのスクロールを一番上に戻す
                popup.scrollTop = 0;

                // ポップアップのスタイルをリセット
                popup.classList.remove('evolved', 'blessed');
                icon.classList.remove('evolved');

                // 進化後アイテムの場合、黄色背景を適用
                const isEvolved = this.currentTab === 'evolution';
                const isBlessed = this.currentTab === 'blessed';
                if (isEvolved) {
                    popup.classList.add('evolved');
                    icon.classList.add('evolved');
                } else if (isBlessed) {
                    popup.classList.add('blessed');
                    icon.classList.add('evolved');
                }

                // ポップアップアイコン設定（フレーム付き）
                const frameImageUrl = getFrameImagePath(item.rarity, this.currentTab);
                const itemImageUrl = getItemImagePath(item.id, isEvolved || isBlessed);

                icon.style.backgroundImage = `url('${frameImageUrl}')`;

                let iconHTML = `<div class="popup-item-image" style="background-image: url('${itemImageUrl}'); z-index: 4;"></div>`;

                // 祝福宝物の場合、回転エフェクトを追加
                if (isBlessed) {
                    const blessingEffectUrl = getBlessingEffectPath(item.rarity);
                    iconHTML += `<div class="popup-blessing-effect" style="background-image: url('${blessingEffectUrl}'); z-index: 3;"></div>`;
                }

                // パッシブタグエフェクトを追加（一番上に表示）
                if (item.hasPassiveTag) {
                    iconHTML += `<div class="popup-passive-tag-effect" style="background-image: url('img/treasure_tag_passive.webp'); z-index: 5;"></div>`;
                }

                // Useタグエフェクトを追加（一番上に表示）
                if (item.hasUseTag) {
                    iconHTML += `<div class="popup-passive-tag-effect" style="background-image: url('img/treasure_tag_use.webp'); z-index: 5;"></div>`;
                }

                // Sランクの祝福宝物の場合、エフェクトアニメーションを追加（最上位に表示）
                if (isBlessed && item.rarity === 'S') {
                    iconHTML += `<div class="popup-effect-animation" style="z-index: 6;"></div>`;
                }

                icon.innerHTML = iconHTML;

                // アイテム名に色を適用
                title.textContent = item.name; //改行しない
                title.style.color = getRarityColor(item.rarity);

                // 韓国語名コピーボタンの設定
                const copyKoreanBtn = document.getElementById('copyKoreanBtn');
                const koreanName = getKoreanName(item.id);

                if (koreanName) {
                    copyKoreanBtn.style.display = 'block';
                    copyKoreanBtn.textContent = '🔍韓国語名コピー';
                    copyKoreanBtn.classList.remove('copied');
                    copyKoreanBtn.onclick = () => {
                        // 改行コードを半角スペースに変換
                        let processedName = koreanName.replace(/\\n/g, ' ').replace(/\n/g, ' ');

                        // 17文字以上の場合は16文字まで切り取り
                        if (processedName.length > 16) {
                            processedName = processedName.substring(0, 16);
                        }

                        // 代替コピー方法(古いブラウザ対応)
                        const textArea = document.createElement('textarea');
                        textArea.value = processedName;
                        textArea.style.position = 'fixed';
                        textArea.style.left = '-999999px';
                        textArea.style.top = '-999999px';
                        document.body.appendChild(textArea);
                        textArea.focus();
                        textArea.select();

                        try {
                            document.execCommand('copy');
                            textArea.remove();

                            // コピー成功の表示
                            copyKoreanBtn.textContent = '✓';
                            copyKoreanBtn.classList.add('copied');

                            // 2秒後に元に戻す
                            setTimeout(() => {
                                copyKoreanBtn.textContent = '🔍韓国語名コピー';
                                copyKoreanBtn.classList.remove('copied');
                            }, 2000);
                        } catch (err) {
                            console.error('コピーに失敗しました:', err);
                            textArea.remove();
                            alert('コピーに失敗しました');
                        }
                    };
                } else {
                    copyKoreanBtn.style.display = 'none';
                }

                effect.textContent = item.effect.replace(/\\n/g, '\n'); //'/n'で改行する
                effect.style.whiteSpace = 'pre-line';

                method.textContent = item.method.replace(/\\n/g, '\n');
                method.style.whiteSpace = 'pre-line';

                // 進化可能なアイテムの場合
                if (item.canEvolve) {
                    evolutionSection.style.display = 'block';

                    let nextEvolutionItem = null;
                    if (this.currentTab === 'general') {
                        nextEvolutionItem = this.findEvolvedItem(item.id);
                        evolutionSection.querySelector('.popup-section-title').textContent = '進化可能な宝物';
                    } else if (this.currentTab === 'evolution') {
                        nextEvolutionItem = this.findBlessedItem(item.id);
                        evolutionSection.querySelector('.popup-section-title').textContent = '祝福された宝物';
                    }

                    if (nextEvolutionItem) {
                        evolution.innerHTML = this.createEvolutionPreview(nextEvolutionItem);
                    }
                } else {
                    evolutionSection.style.display = 'none';
                }

                // アイテム説明セクションを追加
                this.addDescriptionSection(item);

                // 進化前のアイテムを表示(進化宝物と祝福宝物のみ)
                this.addBaseItemSection(item);

                overlay.classList.add('show');
            }
            // 進化前アイテムセクションを追加
            addBaseItemSection(item) {
                // 既存の進化前セクションを削除
                const existingBaseSection = document.getElementById('baseItemSection');
                if (existingBaseSection) {
                    existingBaseSection.remove();
                }

                // 進化前アイテムを検索
                const baseItem = this.findBaseItem(item);
                if (!baseItem) return;

                const popup = document.getElementById('popup');
                const descSection = document.getElementById('descriptionSection');

                // 進化前セクションを作成
                const baseSection = document.createElement('div');
                baseSection.id = 'baseItemSection';
                baseSection.className = 'popup-section';

                // 進化前アイテムのタブを判定
                let baseTabType = 'general';
                if (ITEM_DATA.evolution.some(i => i.id === baseItem.id)) {
                    baseTabType = 'evolution';
                } else if (ITEM_DATA.blessed.some(i => i.id === baseItem.id)) {
                    baseTabType = 'blessed';
                }

                const baseSectionTitle = this.currentTab === 'blessed' ? '祝福前の宝物' : '進化前の宝物';
                baseSection.innerHTML = `
                    <div class="popup-section-title">${baseSectionTitle}</div>
                    <div class="evolution-preview" onclick="inventoryUI.showEvolvedItemPopup('${baseItem.id}')">
                        <div class="evolution-icon" style="background-image: url('${getFrameImagePath(baseItem.rarity, baseTabType)}');">
                            <div class="evolution-item-image" style="background-image: url('${getItemImagePath(baseItem.id, baseTabType !== 'general')}'); z-index: 4;"></div>
                            ${baseTabType === 'blessed' ? `<div class="blessing-effect" style="background-image: url('${getBlessingEffectPath(baseItem.rarity)}'); z-index: 3;"></div>` : ''}
                            ${baseItem.hasPassiveTag ? `<div class="passive-tag-effect" style="background-image: url('img/treasure_tag_passive.png'); z-index: 5;"></div>` : ''}
                            ${baseItem.hasUseTag ? `<div class="passive-tag-effect" style="background-image: url('img/treasure_tag_use.png'); z-index: 5;"></div>` : ''}
                            ${baseTabType === 'blessed' && baseItem.rarity === 'S' ? `<div class="effect-animation" style="z-index: 6;"></div>` : ''}
                        </div>
                        <div>
                            <div style="font-weight: bold; color: ${getRarityColor(baseItem.rarity)};">${baseItem.name}</div>
                            <div style="font-size: 14px; color: #666; margin-top: 5px;">${baseItem.effect}</div>
                        </div>
                    </div>
                `;

                // 説明セクションの後に追加
                if (descSection) {
                    descSection.insertAdjacentElement('afterend', baseSection);
                }
            }
            // アイテム説明セクションを追加
            addDescriptionSection(item) {
                // 既存の説明セクションを削除
                const existingDescSection = document.getElementById('descriptionSection');
                if (existingDescSection) {
                    existingDescSection.remove();
                }

                const popup = document.getElementById('popup');
                const evolutionSection = document.getElementById('evolutionSection');

                // 説明セクションを作成
                const descSection = document.createElement('div');
                descSection.id = 'descriptionSection';
                descSection.className = 'popup-section';
                const description = item.description || 'アイテムの説明がありません。';
                const formattedDescription = description.replace(/\\n/g, '\n');
                descSection.innerHTML = `
                <div class="popup-section-title">説明</div>
                <div class="popup-description" style="white-space: pre-line;">${formattedDescription}</div>
                `;

                // 進化可能アイテムで進化セクションが表示されている場合は進化セクションの後に追加
                if (item.canEvolve && evolutionSection.style.display !== 'none') {
                    evolutionSection.insertAdjacentElement('afterend', descSection);
                } else {
                    // それ以外の場合は、入手方法セクションを探して後に追加
                    const allSections = popup.querySelectorAll('.popup-section');
                    let methodSection = null;

                    // 入手方法セクションを探す
                    for (let section of allSections) {
                        const title = section.querySelector('.popup-section-title');
                        if (title && title.textContent === '入手方法') {
                            methodSection = section;
                            break;
                        }
                    }

                    if (methodSection) {
                        methodSection.insertAdjacentElement('afterend', descSection);
                    } else {
                        // 見つからない場合は最後に追加
                        popup.appendChild(descSection);
                    }
                }
            }
            // 進化プレビューHTML作成
            createEvolutionPreview(evolvedItem) {
                // 祝福宝物かどうかを判定
                const isBlessed = ITEM_DATA.blessed.some(item => item.id === evolvedItem.id);
                const tabType = isBlessed ? 'blessed' : 'evolution';

                let iconHTML = `<div class="evolution-item-image" style="background-image: url('${getItemImagePath(evolvedItem.id, true)}'); z-index: 4;"></div>`;

                // 祝福宝物の場合のみ、回転エフェクトを追加
                if (isBlessed) {
                    const blessingEffectUrl = getBlessingEffectPath(evolvedItem.rarity);
                    iconHTML += `<div class="blessing-effect" style="background-image: url('${blessingEffectUrl}'); z-index: 3;"></div>`;
                }

                // パッシブタグエフェクトを追加（一番上に表示）
                if (evolvedItem.hasPassiveTag) {
                    iconHTML += `<div class="passive-tag-effect" style="background-image: url('img/treasure_tag_passive.webp'); z-index: 5;"></div>`;
                }

                // Useタグエフェクトを追加（一番上に表示）
                if (evolvedItem.hasUseTag) {
                    iconHTML += `<div class="passive-tag-effect" style="background-image: url('img/treasure_tag_use.webp'); z-index: 5;"></div>`;
                }

                // Sランクの祝福宝物の場合、エフェクトアニメーションを追加（最上位に表示）
                if (isBlessed && evolvedItem.rarity === 'S') {
                    iconHTML += `<div class="effect-animation" style="z-index: 6;"></div>`;
                }

                return `
        <div class="evolution-preview" onclick="inventoryUI.showEvolvedItemPopup('${evolvedItem.id}')">
            <div class="evolution-icon" style="background-image: url('${getFrameImagePath(evolvedItem.rarity, tabType)}');">
                ${iconHTML}
            </div>
            <div>
                <div style="font-weight: bold; color: ${getRarityColor(evolvedItem.rarity)};">${evolvedItem.name}</div>
                <div style="font-size: 14px; color: #666; margin-top: 5px;">${evolvedItem.effect}</div>
            </div>
        </div>
    `;
            }
            // 進化したアイテムを検索
            findEvolvedItem(baseId) {
                return ITEM_DATA.evolution.find(item => item.baseId === baseId);
            }

            // 祝福されたアイテムを検索
            findBlessedItem(baseId) {
                return ITEM_DATA.blessed.find(item => item.baseId === baseId);
            }

            // 進化前のアイテムを検索
            findBaseItem(currentItem) {
                if (!currentItem.baseId) return null;

                // 全カテゴリから検索
                for (let category of ['general', 'evolution', 'blessed']) {
                    const baseItem = ITEM_DATA[category].find(item => item.id === currentItem.baseId);
                    if (baseItem) {
                        return baseItem;
                    }
                }
                return null;
            }

            // 進化したアイテムのポップアップ表示
            showEvolvedItemPopup(itemId) {
                // 一般宝物を検索
                let generalItem = ITEM_DATA.general.find(item => item.id === itemId);
                if (generalItem) {
                    this.currentTab = 'general';
                    this.showItemPopup(generalItem, 'evolution');
                    return;
                }

                // 進化アイテムを検索
                let evolvedItem = ITEM_DATA.evolution.find(item => item.id === itemId);
                if (evolvedItem) {
                    this.currentTab = 'evolution';
                    this.showItemPopup(evolvedItem, 'evolution');
                    return;
                }

                // 祝福アイテムを検索
                let blessedItem = ITEM_DATA.blessed.find(item => item.id === itemId);
                if (blessedItem) {
                    this.currentTab = 'blessed';
                    this.showItemPopup(blessedItem, 'blessed');
                    return;
                }
            }
            // ポップアップを閉じる
            closePopup() {
                const overlay = document.getElementById('popupOverlay');
                const popup = document.getElementById('popup');
                const icon = document.getElementById('popupIcon');

                // 履歴が2つ以上ある場合は前の画面に戻る
                if (this.popupHistory.length >= 2) {
                    // 現在のアイテムを履歴から削除
                    this.popupHistory.pop();

                    // ひとつ前のアイテムを取得
                    const previousItem = this.popupHistory[this.popupHistory.length - 1];

                    // 前のアイテムが属するタブに切り替える
                    if (ITEM_DATA.general.some(item => item.id === previousItem.id)) {
                        this.currentTab = 'general';
                    } else if (ITEM_DATA.evolution.some(item => item.id === previousItem.id)) {
                        this.currentTab = 'evolution';
                    } else if (ITEM_DATA.blessed.some(item => item.id === previousItem.id)) {
                        this.currentTab = 'blessed';
                    }

                    this.showItemPopup(previousItem, 'history');
                    return;
                }

                // 通常の閉じる処理
                overlay.classList.remove('show');
                popup.classList.remove('evolved', 'blessed');
                icon.classList.remove('evolved');

                // ポップアップの全てのコンテンツを完全にクリア
                icon.innerHTML = '';
                icon.style.backgroundImage = '';
                document.getElementById('popupTitle').textContent = '';
                document.getElementById('popupTitle').style.color = '';
                document.getElementById('copyKoreanBtn').style.display = 'none';
                document.getElementById('popupEffect').textContent = '';
                document.getElementById('popupEffect').style.whiteSpace = '';
                document.getElementById('popupMethod').textContent = '';
                document.getElementById('popupEvolution').innerHTML = '';
                document.getElementById('evolutionSection').style.display = 'none';

                // 動的に追加された説明セクションを削除
                const existingDescSection = document.getElementById('descriptionSection');
                if (existingDescSection) {
                    existingDescSection.remove();
                }

                // 状態を完全にリセット
                this.currentPopupItem = null;
                this.popupHistory = [];
                this.popupSource = null;
            }

            // タブ切り替え
            switchTab(tabName) {
                const grid = document.getElementById('inventoryGrid');

                // 現在のタブのスクロール位置を保存
                if (this.currentTab && grid) {
                    this.scrollPositions[this.currentTab] = grid.scrollTop;
                }

                this.currentTab = tabName;

                // タブボタンの状態更新
                document.getElementById('generalTab').classList.toggle('active', tabName === 'general');
                document.getElementById('evolutionTab').classList.toggle('active', tabName === 'evolution');
                document.getElementById('blessedTab').classList.toggle('active', tabName === 'blessed');

                // アイテムリスト更新（検索中の場合は検索結果を、そうでなければ全データを表示）
                const items = this.isSearching ? this.searchResults[tabName] : ITEM_DATA[tabName];
                this.createInventoryGrid(items);

                // 保存されたスクロール位置を復元
                if (grid && this.scrollPositions[tabName] !== undefined) {
                    // 少し遅延をかけてスクロール位置を復元（DOM更新後に実行）
                    setTimeout(() => {
                        grid.scrollTop = this.scrollPositions[tabName];
                    }, 10);
                }
            }
            // アイテム数更新
            updateItemCount(count) {
                const itemCountDisplay = document.getElementById('itemCountDisplay');
                if (itemCountDisplay) {
                    itemCountDisplay.textContent = `宝物数: ${count}件`;
                }
            }

            // 初期化
            init() {
                this.switchTab('general');
                this.setupEventListeners();
                this.addCustomStyles();
            }

            // カスタムスタイルを追加
            addCustomStyles() {
                const style = document.createElement('style');
                document.head.appendChild(style);
            }

            // 検索実行
            performSearch(searchTerm) {
                const searchBox = document.getElementById('searchBox');
                const clearBtn = document.getElementById('searchClearBtn');

                if (!searchTerm.trim()) {
                    // 検索語が空の場合、検索をクリアする
                    this.clearSearch();
                    return;
                }

                // クリアボタンを表示
                clearBtn.style.display = 'block';

                this.isSearching = true;
                const searchTerms = searchTerm.toLowerCase().split(/\s+/).filter(term => term.length > 0);

                // 各カテゴリで検索を実行
                ['general', 'evolution', 'blessed'].forEach(category => {
                    // バージョンフィルタが有効な場合は、フィルタ済みデータから検索
                    const sourceData = this.isVersionFiltered 
                        ? ITEM_DATA[category].filter(item => {
                            const versionIds = VERSION_DATA[this.currentVersion] || [];
                            return versionIds.includes(item.id);
                        })
                        : ITEM_DATA[category];

                        this.searchResults[category] = sourceData.filter(item => {
                        // チェックされた項目から検索対象のテキストを収集
                        const searchTargets = [];

                        if (this.searchOptions.name) {
                            searchTargets.push(item.name.toLowerCase());
                        }
                        if (this.searchOptions.effect) {
                            searchTargets.push(item.effect.toLowerCase());
                        }
                        if (this.searchOptions.method) {
                            searchTargets.push(item.method.toLowerCase());
                        }
                        if (this.searchOptions.description && item.description) {
                            searchTargets.push(item.description.toLowerCase());
                        }

                        // 検索対象がない場合はfalse
                        if (searchTargets.length === 0) {
                            return false;
                        }

                        // 全ての検索語が、いずれかの検索対象に含まれているかチェック（AND検索）
                        return searchTerms.every(searchTerm => {
                            return searchTargets.some(target => target.includes(searchTerm));
                        });
                    });
                });

                // 現在のタブを再描画
                this.switchTab(this.currentTab);
            }

            // 検索オプションの変更時
            onSearchOptionChange() {
                // チェックボックスの状態を更新
                this.searchOptions.name = document.getElementById('searchName').checked;
                this.searchOptions.effect = document.getElementById('searchEffect').checked;
                this.searchOptions.method = document.getElementById('searchMethod').checked;
                this.searchOptions.description = document.getElementById('searchDescription').checked;

                // 検索ボックスに値がある場合は再検索
                const searchBox = document.getElementById('searchBox');
                if (searchBox.value.trim()) {
                    this.performSearch(searchBox.value);
                }
            }

            // ヘッダーの開閉切り替え
            toggleHeader() {
                const headerContent = document.getElementById('headerContent');
                const toggleBtn = document.getElementById('headerToggleBtn');
                const header = document.querySelector('.header');

                this.isHeaderCollapsed = !this.isHeaderCollapsed;

                if (this.isHeaderCollapsed) {
                    headerContent.classList.add('collapsed');
                    header.classList.add('collapsed');
                    toggleBtn.textContent = '▼';
                    toggleBtn.title = 'ヘッダーを表示';
                } else {
                    headerContent.classList.remove('collapsed');
                    header.classList.remove('collapsed');
                    toggleBtn.textContent = '▲';
                    toggleBtn.title = 'ヘッダーを非表示';
                }
            }

            // 検索クリア
            clearSearch() {
                const searchBox = document.getElementById('searchBox');
                const clearBtn = document.getElementById('searchClearBtn');

                searchBox.value = '';
                clearBtn.style.display = 'none';

                // バージョンフィルタが有効な場合は、検索フラグをそのまま維持
                if (!this.isVersionFiltered) {
                    this.isSearching = false;
                }

                // 検索結果をクリア(バージョンフィルタが有効な場合は再設定)
                if (this.isVersionFiltered) {
                    const versionIds = VERSION_DATA[this.currentVersion] || [];
                    ['general', 'evolution', 'blessed'].forEach(category => {
                        this.searchResults[category] = ITEM_DATA[category].filter(item => {
                            return versionIds.includes(item.id);
                        });
                    });
                } else {
                    this.searchResults = {
                        general: [],
                        evolution: [],
                        blessed: []
                    };
                }

                // 現在のタブを再描画
                this.switchTab(this.currentTab);
            }

            // バージョン選択変更時の処理
            onVersionChange(version) {
                const searchBox = document.getElementById('searchBox');

                if (!version) {
                    // 「バージョン選択」を選んだ場合はフィルター解除
                    this.isVersionFiltered = false;
                    this.currentVersion = null;

                    // 検索ボックスに値がある場合は検索を再実行、なければ完全にクリア
                    if (searchBox.value.trim()) {
                        this.performSearch(searchBox.value);
                    } else {
                        this.isSearching = false;
                        this.searchResults = {
                            general: [],
                            evolution: [],
                            blessed: []
                        };
                    }
                } else {
                    // フィルター有効化
                    this.isVersionFiltered = true;
                    this.currentVersion = version;

                    // 検索中フラグを立てる
                    this.isSearching = true;

                    // 検索ボックスに値がある場合は検索を再実行
                    if (searchBox.value.trim()) {
                        this.performSearch(searchBox.value);
                    } else {
                        // バージョンに該当するアイテムIDを取得
                        const versionIds = VERSION_DATA[version] || [];

                        // 各カテゴリでフィルタリング
                        ['general', 'evolution', 'blessed'].forEach(category => {
                            this.searchResults[category] = ITEM_DATA[category].filter(item => {
                                return versionIds.includes(item.id);
                            });
                        });
                    }
                }

                // 現在のタブを再描画
                this.switchTab(this.currentTab);
            }

            // 共有リンクを生成してコピー
            shareItem() {
                if (!this.currentPopupItem) return;

                const itemId = this.currentPopupItem.id;
                const baseUrl = window.location.origin + window.location.pathname;
                const shareUrl = `${baseUrl}?item=${itemId}`;

                // コピー処理
                const textArea = document.createElement('textarea');
                textArea.value = shareUrl;
                textArea.style.position = 'fixed';
                textArea.style.left = '-999999px';
                textArea.style.top = '-999999px';
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();

                try {
                    document.execCommand('copy');
                    textArea.remove();

                    // コピー成功の表示
                    const shareBtn = document.getElementById('shareBtn');
                    const originalText = shareBtn.textContent;
                    shareBtn.textContent = '✓';
                    shareBtn.classList.add('copied');

                    // 2秒後に元に戻す
                    setTimeout(() => {
                        shareBtn.textContent = originalText;
                        shareBtn.classList.remove('copied');
                    }, 2000);
                } catch (err) {
                    console.error('コピーに失敗しました:', err);
                    textArea.remove();
                    alert('コピーに失敗しました');
                }
            }

            // URLパラメータから共有アイテムを開く
            openSharedItem() {
                const urlParams = new URLSearchParams(window.location.search);
                const itemId = urlParams.get('item');

                if (itemId) {
                    // 全カテゴリからアイテムを検索
                    let foundItem = null;
                    let foundCategory = null;

                    for (let category of ['general', 'evolution', 'blessed']) {
                        const item = ITEM_DATA[category].find(i => i.id === itemId);
                        if (item) {
                            foundItem = item;
                            foundCategory = category;
                            break;
                        }
                    }

                    if (foundItem && foundCategory) {
                        // タブを切り替えてポップアップを開く
                        this.switchTab(foundCategory);
                        // 少し遅延させてからポップアップを開く
                        setTimeout(() => {
                            this.showItemPopup(foundItem);
                        }, 100);
                    }
                }
            }

            // イベントリスナー設定
            setupEventListeners() {
                // オーバーレイクリックで閉じる
                document.getElementById('popupOverlay').onclick = (e) => {
                    if (e.target === document.getElementById('popupOverlay')) {
                        this.closePopup();
                    }
                };

                // ESCキーで閉じる
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && document.getElementById('popupOverlay').classList.contains('show')) {
                        this.closePopup();
                    }
                });
            }
        }

        // グローバル関数（HTMLから呼び出すため）
        let inventoryUI;

        function switchTab(tabName) {
            inventoryUI.switchTab(tabName);
        }

        function showEvolvedItemPopup(itemId) {
            inventoryUI.showEvolvedItemPopup(itemId);
        }

		function closePopup() {
            inventoryUI.closePopup();
        }

        function onSearchOptionChange() {
            inventoryUI.onSearchOptionChange();
        }

        function toggleHeader() {
            inventoryUI.toggleHeader();
        }

        function shareItem() {
            inventoryUI.shareItem();
        }

        // アプリケーション初期化
        document.addEventListener('DOMContentLoaded', function () {
            // UIインスタンス作成
            inventoryUI = new InventoryUI();

            // 初期化
            inventoryUI.init();

            // 共有リンクからのアクセスをチェック
            inventoryUI.openSharedItem();

            console.log('アイテム一覧UIが初期化されました');
            console.log(`一般宝物: ${ITEM_DATA.general.length}個`);
            console.log(`進化宝物: ${ITEM_DATA.evolution.length}個`);
        });

        // 画像読み込みエラー処理
        function handleImageError(img) {
            img.style.display = 'none';
            console.warn('画像が読み込めませんでした:', img.src);
        }

        // 言語切り替え関数
        function switchLanguage(lang) {
            if (lang === 'ja') {
                window.location.href = 'index.html';
            } else if (lang === 'ko') {
                window.location.href = 'index_ko.html';
            }
        }
    </script>
</body>
